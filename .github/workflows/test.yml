name: Test Python application

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    # 💡 수정 포인트: 프로젝트 전체를 설치하지 않고 ruff만 설치합니다.
    # 이렇게 하면 portaudio 관련 에러를 피할 수 있고 속도도 훨씬 빠릅니다.
    - name: Install ruff
      run: uv pip install --system ruff

    - name: Ruff lint
      run: |
        ruff check --select=E9,F63,F7,F82
        ruff check --exit-zero --statistics
    - name: Ruff format check
      run: ruff format --check .

  test:
    needs: lint
    strategy:
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12', '3.13']

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # ✅ 여기는 실제 테스트를 위해 전체 설치가 필요하므로 시스템 의존성을 유지합니다.
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y portaudio19-dev gcc

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install project with test dependencies
      run: |
        uv pip install --system ".[test]"

    - name: Run tests
      run: pytest
