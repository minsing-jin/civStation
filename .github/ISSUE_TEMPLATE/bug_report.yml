name: Bug report
description: Report a reproducible problem in CivStation
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please include enough detail for someone else to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A short description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: List the exact steps to reproduce the issue
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command and config
      description: Paste the command, flags, or config you used
      render: bash
  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Include relevant output, traceback, or screenshots
      render: text
  - type: input
    id: civstation_version
    attributes:
      label: CivStation version
      placeholder: e.g. latest main, commit hash, release tag
  - type: input
    id: python_version
    attributes:
      label: Python version
      placeholder: e.g. 3.11.11
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.4

