# config.yaml
# ConfigArgParsežö© žĄ§ž†ē ŪĆĆžĚľ

# --- 1. LLM Provider Settings ---
provider: gemini
model: gemini-3-flash-preview

# ÍįúŽ≥Ą žĄ§ž†ēžĚī ŪēĄžöĒŪēėŽ©ī ž£ľžĄĚ Ūēīž†ú ŪõĄ žā¨žö©
router-provider: gemini
router-model: gemini-3-flash-preview
planner-provider: gemini
planner-model: gemini-3-flash-preview

# --- 2. Execution Parameters ---
turns: 100
range: 10000
prompt-language: eng
debug: "all"   # comma-separated: context | turns | all
router-img-max-long-edge: 1024

# Action backend selection. Choose exactly one backend at startup with:
#   civstation run --backend {vlm,civ6-mcp}
# Omitting --backend keeps the default VLM/computer-use pipeline.
#   vlm        - screenshots + computer-use (default; existing pipeline).
#   civ6-mcp   - drive Civ6 directly through the upstream civ6-mcp MCP server
#                (https://github.com/lmwilki/civ6-mcp). This disables the VLM
#                stack entirely; it is mutually exclusive, not a VLM fallback.
backend: vlm

# Required when backend: civ6-mcp.
# civ6-mcp-path must point to a local lmwilki/civ6-mcp checkout containing
# pyproject.toml. If omitted, civStation falls back to $CIV6_MCP_PATH, then
# ~/civ6-mcp.
# Example setup:
#   git clone https://github.com/lmwilki/civ6-mcp ~/civ6-mcp
#   cd ~/civ6-mcp && uv sync
# civ6-mcp-path: "/Users/me/civ6-mcp"

# Required when backend: civ6-mcp unless CIV6_MCP_LAUNCHER is set.
#   uv      - default/recommended; runs `uv run --directory <path> civ-mcp`.
#   python  - runs `python -m civ_mcp`; activate civ6-mcp's venv first.
# civ6-mcp-launcher: uv

# civ6-mcp also requires Steam Civ6 with Gathering Storm and FireTuner enabled.
# Optional upstream server settings are environment variables, not YAML keys:
#   CIV_MCP_SAVE_FILE=/path/to/save.Civ6Save
#   CIV_MCP_AGENT_MODEL=<model-name>
#   CIV_MCP_METADATA=key=value
#   CIV_MCP_TELEMETRY_BUCKET=<bucket>
#   CIV_MCP_ALERT_WEBHOOK=<url>
#   CIV_MCP_DISABLE_LUA=1

# --- 3. Strategy & HITL ---
strategy: "Í≥ľŪēô žäĻŽ¶¨žóź žßĎž§ĎŪēėÍ≥† ž†ēžįįžĚĄ ÍįēŪôĒŪēī."
hitl: true
autonomous: true
hitl-mode: async
# wait-for-start: true

# --- 4. Chat App Integration ---
chatapp: original   # original | discord | whatsapp
# discord-token: "YOUR_TOKEN_HERE"
# discord-channel: "1234567890"
# discord-user: "1234567890"
# whatsapp-token: "YOUR_TOKEN_HERE"
# whatsapp-phone-number-id: "1234567890"
# whatsapp-user: "1234567890"
# enable-discussion: false

# --- 5. Knowledge Retrieval ---
# knowledge-index: "./data/civopedia.json"
# enable-web-search: false

# --- 6. Control API / Status UI ---
control-api: true   # start/pause/resume/stop API only
status-ui: true     # dashboard + control API
# status-port: 8765
