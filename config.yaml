# config.yaml
# ConfigArgParse용 설정 파일

# --- 1. LLM Provider Settings ---
provider: gemini
model: gemini-3-flash-preview

# 개별 설정이 필요하면 주석 해제 후 사용
# router-provider: gemini
# router-model: gemini-3-flash-preview
# planner-provider: claude
# planner-model: claude-4-5-sonnet

# --- 2. Execution Parameters ---
turns: 10
range: 10000
debug: "all"   # comma-separated: context | turns | all
router-img-max-long-edge: 1024

# --- 3. Strategy & HITL ---
strategy: "과학 승리에 집중하고 정찰을 강화해."
hitl: true
autonomous: true
hitl-mode: async
# wait-for-start: true

# --- 4. Chat App Integration ---
chatapp: original   # original | discord | whatsapp
# discord-token: "YOUR_TOKEN_HERE"
# discord-channel: "1234567890"
# discord-user: "1234567890"
# whatsapp-token: "YOUR_TOKEN_HERE"
# whatsapp-phone-number-id: "1234567890"
# whatsapp-user: "1234567890"
# enable-discussion: false

# --- 5. Knowledge Retrieval ---
# knowledge-index: "./data/civopedia.json"
# enable-web-search: false

# --- 6. Control API / Status UI ---
control-api: true   # start/pause/resume/stop API only
status-ui: true     # dashboard + control API
# status-port: 8765
