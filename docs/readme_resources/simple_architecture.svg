<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="864" viewBox="0 0 1536 864" role="img" aria-labelledby="title desc">
  <title id="title">Simple CivStation Architecture</title>
  <desc id="desc">A simple architecture diagram showing HITL orders flowing into a background strategy agent, strategy and order flowing to a main-process action agent, and context flowing back to the strategy agent.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111" />
    </marker>
    <style>
      .label { font: 700 38px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #111111; }
      .small { font: 600 28px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #111111; }
      .boxtext { font: 700 48px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #111111; }
      .process { font: 700 42px 'Trebuchet MS', 'Segoe UI', sans-serif; fill: #111111; }
      .line { stroke: #111111; stroke-width: 8; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #d94a45; stroke-width: 6; stroke-dasharray: 18 18; }
    </style>
  </defs>

  <rect width="1536" height="864" fill="#ffffff" />

  <text x="110" y="320" class="process">Background</text>
  <text x="120" y="372" class="process">process</text>
  <text x="110" y="620" class="process">Main</text>
  <text x="120" y="672" class="process">process</text>

  <line x1="70" y1="432" x2="980" y2="432" class="divider" />

  <rect x="360" y="148" width="470" height="170" rx="18" fill="#ffffff" stroke="#5b8fe8" stroke-width="8" />
  <text x="595" y="245" text-anchor="middle" class="boxtext">Strategy Agent</text>

  <rect x="420" y="564" width="410" height="160" rx="18" fill="#ffffff" stroke="#de4f4a" stroke-width="8" />
  <text x="625" y="654" text-anchor="middle" class="boxtext">Action Agent</text>

  <line x1="555" y1="322" x2="555" y2="560" class="line" />
  <text x="493" y="500" class="small">strategy</text>
  <text x="520" y="536" class="small">+</text>
  <text x="485" y="572" class="small">order</text>

  <line x1="645" y1="564" x2="645" y2="326" class="line" />
  <text x="664" y="498" class="small">context</text>

  <text x="1330" y="92" class="label">HITL</text>
  <rect x="1280" y="150" width="170" height="360" rx="24" fill="#ffffff" stroke="#111111" stroke-width="10" />
  <rect x="1344" y="168" width="42" height="12" rx="6" fill="#111111" />
  <text x="1365" y="355" text-anchor="middle" class="boxtext">Phone</text>

  <line x1="1260" y1="270" x2="890" y2="270" class="line" />
  <text x="1075" y="236" class="small">order</text>
</svg>
