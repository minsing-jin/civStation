site_name: CivStation Docs
site_description: Runtime, tooling, and control surfaces for letting VLMs play Civilization VI.
site_url: https://minsing-jin.github.io/civStation/
site_dir: ../site
docs_dir: .
repo_url: https://github.com/minsing-jin/civStation
repo_name: minsing-jin/civStation
edit_uri: edit/main/docs/
strict: true

theme:
  name: material
  language: en
  font: false
  palette:
    - scheme: default
      primary: blue grey
      accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.tabs.link

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          build: true
          name: English
          nav_translations:
            Home: Home
            Getting Started: Getting Started
            Concepts: Concepts
            Guides: Guides
            Reference: Reference
            Development: Development
            Appendix: Appendix
            Installation: Installation
